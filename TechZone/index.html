<script>
function acessarAdmin(e) {
    e.preventDefault();
    
    Swal.fire({
        title: 'Área Restrita',
        text: 'Digite a senha do administrador:',
        input: 'password',
        inputAttributes: {
            autocapitalize: 'off',
            autocorrect: 'off'
        },
        showCancelButton: true,
        confirmButtonColor: '#22c55e',
        cancelButtonColor: '#ef4444',
        confirmButtonText: 'Entrar',
        cancelButtonText: 'Cancelar',
        background: '#0a0f1e',
        color: '#fff'
    }).then((result) => {
        if (result.isConfirmed && result.value === 'admin123') {
            window.location.href = 'views/painel_pedidos.php';
        } else if (result.isConfirmed) {
            Swal.fire({
                icon: 'error',
                title: 'Acesso Negado',
                text: 'Senha incorreta!',
                background: '#0a0f1e',
                color: '#fff'
            });
        }
    });
}

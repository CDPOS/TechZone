<head>

<header>
    <h1>⚡ TechZone</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="produtos.html">Produtos</a>
        <a href="contato.html">Contato</a>
        <a href="carrinho.html" class="nav-carrinho">
            🛒 Carrinho 
            <span id="contagem-carrinho" style="background: #ef4444; color: white; border-radius: 50%; padding: 2px 7px; font-size: 11px; margin-left: 5px; display: none;">0</span>
        </a>
    </nav>
</header>

<main>
    <h2 class="titulo-sessao">🛒 Catálogo Completo</h2>

    <section class="barra-filtros">
        <div>
            <label for="filtro-categoria">Filtrar por:</label>
            <select id="filtro-categoria" onchange="filtrarProdutos()">
                <option value="todos">Todas as Categorias</option>
                <option value="hardware">Hardware</option>
                <option value="perifericos">Periféricos</option>
                <option value="acessorios">Acessórios</option>
            </select>
        </div>

        <div>
            <label for="ordenar-preco">Ordenar:</label>
            <select id="ordenar-preco" onchange="ordenarProdutosPagina()">
                <option value="padrao">Destaques</option>
                <option value="crescente">Menor Preço</option>
                <option value="decrescente">Maior Preço</option>
            </select>
        </div>
        <span id="contador-produtos" style="font-size: 14px; color: #94a3b8; font-weight: bold;"></span>
    </section>

    <section class="container-produtos">
        <ul class="lista-produtos" id="vitrine-produtos"></ul>
    </section>
</main>
